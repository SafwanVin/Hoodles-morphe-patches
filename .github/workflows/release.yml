name: Release

# CHANGED: It will now ONLY run when you manually click the button on GitHub
on:
  workflow_dispatch:

jobs:
  release:
    name: Release
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: burrunan/gradle-cache-action@v3

      # Cleans old builds first, then generates the bundle
      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew clean :patches:buildAndroid generatePatchesList

      # AUTOMATIC VERSION DETECTION: Reads the version out of your project properties
      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d= -f2 | xargs)
          echo "VERSION=v$VERSION" >> $GITHUB_OUTPUT

      # Automatically creates a clean public GitHub Release with your auto-detected version
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "**/build/libs/patches-*[0-9].mpp"
          tag: ${{ steps.get_version.outputs.VERSION }}
          name: "Release ${{ steps.get_version.outputs.VERSION }}"
          body: "Automated build of Morphe Patches Bundle."
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # Purges jsDelivr CDN cache for project sync
      - name: Purge jsDelivr Cache
        run: |
          for file in patches-bundle.json patches-list.json; do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@${{ github.ref_name }}/$file"
          done
